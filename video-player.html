<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>html,body{margin:0;height:100%;background:#000}#v{width:100%;height:100vh;object-fit:contain}</style>
</head>
<body>
<video id="v" controls playsinline preload="auto"></video>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script>
(function () {
  var p = new URLSearchParams(location.search);
  var id = p.get("id");
  var cdn = (p.get("cdn") || "https://cdn.vibecreators.vn").replace(/\/+$/,"");
  var poster = p.get("poster");
  var token = p.get("token") || "";        // ?token=...&expires=... nếu bật Token Auth
  if (token && token[0] !== "?") token = "?" + token;

  var v = document.getElementById("v");
  if (poster) v.poster = cdn + "/" + id + "/" + poster + token;
  var src = cdn + "/" + id + "/playlist.m3u8" + token;

  if (v.canPlayType("application/vnd.apple.mpegurl")) {
    v.src = src;
  } else if (window.Hls && Hls.isSupported()) {
    var hls = new Hls({ enableWorker:true, capLevelToPlayerSize:true });
    hls.loadSource(src); hls.attachMedia(v);
    hls.on(Hls.Events.ERROR, function(_, d){
      if (d.fatal) { if (d.type===Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                     else if (d.type===Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                     else hls.destroy(); }
    });
  }
})();
</script>
</body>
</html>
